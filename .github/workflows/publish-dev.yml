name: publish-dev

on:
    push:
        branches:
            - dev

permissions:
    contents: write # for checkout and tag

jobs:
    publish:
        strategy:
            matrix:
                os: [ubuntu-22.04]
                node: [22.x]

        name: Publish Storybook (${{ matrix.os }} / Node.js ${{ matrix.node }})
        runs-on: ${{ matrix.os }}
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Node.js ${{ matrix.node }}
              uses: ./.github/actions/node-setup
              with:
                  node-version: ${{ matrix.node }}
              env:
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Lint
              run: pnpm lint

            - name: Test
              run: pnpm test

            - name: Build
              run: pnpm build:packages
              env:
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish Alpha & Master Storybook to GitHub Pages
              run: |
                  git switch -f master
                  pnpm install
                  pnpm build:packages
                  pnpm storybook:deploy -- -- -- --out='./gp' --dry-run
                  git switch -f dev
                  pnpm install
                  pnpm build:packages
                  pnpm storybook:deploy -- -- -- --out='./gp/alpha' --dry-run
                  pnpm storybook:deploy -- -- -- --existing-output-dir='./gp'
              env:
                  GH_TOKEN: ${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}

    summary:
        name: Publish Dev Summary
        runs-on: ubuntu-22.04
        needs: [publish]
        if: always()
        steps:
            - name: Generate workflow summary
              run: |
                  cat >> $GITHUB_STEP_SUMMARY << 'EOF'
                  # Kelvin UI Components - Publish Dev Summary

                  ## 📦 Deployment Information
                  - **Commit**: `${{ github.sha }}`
                  - **Branch**: `${{ github.ref_name }}`
                  - **Environment**: Storybook (GitHub Pages)

                  ## Component Status

                  | Component | Status |
                  |-----------|---------|
                  | Publish (Lint + Test + Build + Storybook Deploy) | ${{ needs.publish.result == 'success' && '✅ Success' || needs.publish.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |

                  ## Deployment Summary
                  - **Master Storybook**: ${{ needs.publish.result == 'success' && '💅 Deployed to /' || needs.publish.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}
                  - **Alpha (Dev) Storybook**: ${{ needs.publish.result == 'success' && '💅 Deployed to /alpha' || needs.publish.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}

                  ---

                  > 🚀 **Storybook Updated**: The alpha storybook has been refreshed from the `dev` branch alongside the latest `master` storybook.
                  EOF
