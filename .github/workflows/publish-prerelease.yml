name: publish-prerelease

on:
    push:
        branches:
            - alpha
            - beta

    # Allows you to run this workflow manually from the Actions tab
    workflow_dispatch:

permissions:
    contents: write # for checkout and tag

jobs:
    publish:
        strategy:
            matrix:
                os: [ubuntu-22.04]
                node: [22.x]

        name: Pre-Release Publish (${{ matrix.os }} / Node.js ${{ matrix.node }})
        runs-on: ${{ matrix.os }}
        outputs:
            new-version: ${{ steps.version.outputs.new-version }}
            release-tag: ${{ steps.version.outputs.release-tag }}
            prerelease-id: ${{ steps.prerelease.outputs.prerelease-id }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v3
              with:
                  fetch-depth: 0

            - name: Git Identity
              run: |
                  git config --global user.name 'github-actions[bot]'
                  git config --global user.email 'github-actions[bot]@users.noreply.github.com'
                  git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/$GITHUB_REPOSITORY
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Node.js ${{ matrix.node }}
              uses: ./.github/actions/node-setup
              with:
                  node-version: ${{ matrix.node }}

            - name: Get Branch Name
              run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV

            - name: Validate Branch
              run: |
                  if [ "$BRANCH_NAME" != "alpha" ] && [ "$BRANCH_NAME" != "beta" ]; then
                    echo "Error: This workflow can only run on 'alpha' or 'beta' branches."
                    echo "Current branch: $BRANCH_NAME"
                    exit 1
                  fi

            - name: Set Prerelease Identifier
              id: prerelease
              run: |
                  if [ "$BRANCH_NAME" = "beta" ]; then
                    echo "PRERELEASE_ID=beta" >> $GITHUB_ENV
                    echo "prerelease-id=beta" >> $GITHUB_OUTPUT
                  else
                    echo "PRERELEASE_ID=alpha" >> $GITHUB_ENV
                    echo "prerelease-id=alpha" >> $GITHUB_OUTPUT
                  fi

            - name: Get Tag
              run: |
                  if [ "$BRANCH_NAME" = "beta" ]; then
                    # On beta branch: exclude alpha tags
                    LAST_VERSION=$(git tag -l --sort=-version:refname | grep -v '\-alpha' | head -n 1 | tr -d v)
                  else
                    # On alpha branch: exclude beta tags
                    LAST_VERSION=$(git tag -l --sort=-version:refname | grep -v '\-beta' | head -n 1 | tr -d v)
                  fi
                  echo "LAST_VERSION=${LAST_VERSION}" >> $GITHUB_ENV

            - name: Get Current Version
              run: |
                  CURRENT_VERSION=$(node -p 'require("./lerna.json").version')
                  echo "CURRENT_VERSION=${CURRENT_VERSION}" >> $GITHUB_ENV

            - name: Set Version
              if: env.CURRENT_VERSION != env.LAST_VERSION
              run: |
                  sed -ie "s/\(\"version\": \"\).[^\"]*/\1$LAST_VERSION/" lerna.json
                  git add lerna.json
                  git commit -m "chore(release): publish $PRERELEASE_ID version [skip ci]"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate Versions (Amend)
              if: env.CURRENT_VERSION != env.LAST_VERSION
              run: |
                  pnpm lerna version prerelease --yes --conventional-commits --conventional-prerelease --preid=$PRERELEASE_ID --no-changelog --amend --force-publish=*
                  git push origin $BRANCH_NAME --force
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate Versions
              if: env.CURRENT_VERSION == env.LAST_VERSION
              run: |
                  pnpm lerna version prerelease --yes --conventional-commits --conventional-prerelease --preid=$PRERELEASE_ID --no-changelog --force-publish=*
                  git push origin $BRANCH_NAME --force
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Capture Version
              id: version
              run: |
                  NEW_VERSION=$(node -p 'require("./lerna.json").version')
                  echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
                  echo "release-tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

            - name: Build packages
              run: pnpm build:packages

            - name: Setting NPM
              run: |
                  pnpm set registry=https://nexus.kelvininc.com/repository/npm-internal
                  pnpm set "//nexus.kelvininc.com/:_auth=$USER_AUTH"
              env:
                  USER_AUTH: ${{ secrets.NEXUS_AUTH }}

            - name: Publish to Nexus
              run: |
                  git reset --hard
                  pnpm lerna publish from-git --yes --canary --force-publish=*
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  USER_AUTH: ${{ secrets.NEXUS_AUTH }}

            - name: Push Tag
              run: git push origin $(git describe --tags --abbrev=0)
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    summary:
        name: Pre-Release Summary
        runs-on: ubuntu-22.04
        needs: [publish]
        if: always()
        steps:
            - name: Generate workflow summary
              run: |
                  cat >> $GITHUB_STEP_SUMMARY << 'EOF'
                  # Kelvin UI Components - Pre-Release Summary

                  ## 📦 Pre-Release Information
                  - **Version**: `${{ needs.publish.outputs.new-version || 'N/A' }}`
                  - **Release Tag**: `${{ needs.publish.outputs.release-tag || 'N/A' }}`
                  - **Channel**: `${{ needs.publish.outputs.prerelease-id || github.ref_name }}`
                  - **Commit**: `${{ github.sha }}`
                  - **Branch**: `${{ github.ref_name }}`
                  - **Environment**: Pre-Release (${{ github.ref_name }})

                  ## Component Status

                  | Component | Status |
                  |-----------|---------|
                  | Pre-Release (Version + Build + Nexus Publish) | ${{ needs.publish.result == 'success' && '✅ Success' || needs.publish.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }} |

                  ## Pre-Release Summary
                  - **Package Release**: ${{ needs.publish.result == 'success' && '📦 Published to Nexus' || needs.publish.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}
                  - **Git Tag**: ${{ needs.publish.result == 'success' && '🏷️ Pushed' || needs.publish.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}

                  ---

                  > 🚀 **Pre-Release Complete**: Version `${{ needs.publish.outputs.new-version || 'N/A' }}` has been successfully released as a pre-release to Nexus!
                  EOF
